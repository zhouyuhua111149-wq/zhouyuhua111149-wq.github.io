<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3Stroll | 指挥中心</title>
    <style>
        body { background: #0a0a0a; color: #00ffa3; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; border: 2px solid #00ffa3; padding: 50px; border-radius: 15px; background: rgba(0, 255, 163, 0.02); box-shadow: 0 0 30px rgba(0, 255, 163, 0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .card { border: 1px solid #00ffa3; padding: 25px; border-radius: 10px; text-decoration: none; color: #00ffa3; transition: 0.3s; font-weight: bold; }
        .card:hover { background: #00ffa3; color: #0a0a0a; box-shadow: 0 0 20px #00ffa3; transform: translateY(-5px); }
        h1 { font-size: 2.5em; letter-spacing: 8px; margin: 0; text-transform: uppercase; }
        .status { margin-top: 40px; font-size: 0.9em; color: #3fb950; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WEB3 STROLL</h1>
        <p style="opacity: 0.6;">DEPIN & 自动化脚本指挥部</p>
        <div class="grid">
            <a href="https://github.com/zhouyuhua111149-wq/go" class="card">🚀 GO 库<br><small>核心脚本</small></a>
            <a href="https://github.com/zhouyuhua111149-wq/web3stroll.github.io" class="card">🔗 项目库<br><small>资源部署</small></a>
        </div>
        <div class="status">● 系统状态：在线 | 域名已绑定</div>
    </div>
</body>
</html>
