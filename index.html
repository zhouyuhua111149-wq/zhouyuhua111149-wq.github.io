<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3Stroll | 指挥中心</title>
    <style>
        body { background: #0a0a0a; color: #00ffa3; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 40px 20px; box-sizing: border-box; }
        .container { text-align: center; border: 2px solid #00ffa3; padding: 40px; border-radius: 15px; background: rgba(0, 255, 163, 0.02); box-shadow: 0 0 30px rgba(0, 255, 163, 0.1); width: 100%; max-width: 600px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { border: 1px solid #00ffa3; padding: 20px; border-radius: 10px; text-decoration: none; color: #00ffa3; transition: 0.3s; font-weight: bold; font-size: 0.9em; }
        .card:hover { background: #00ffa3; color: #0a0a0a; box-shadow: 0 0 20px #00ffa3; transform: translateY(-5px); }
        h1 { font-size: 2em; letter-spacing: 5px; margin: 0; text-transform: uppercase; }
        
        /* 新增的“关于”和“联系”样式 */
        .about-section { margin-top: 40px; text-align: left; border-top: 1px dotted #00ffa3; padding-top: 20px; }
        .about-section h2 { font-size: 1.2em; text-transform: uppercase; margin-bottom: 10px; }
        .about-section p { font-size: 0.85em; line-height: 1.6; opacity: 0.8; color: #fff; }
        .contact-info { margin-top: 20px; display: flex; justify-content: center; gap: 15px; font-size: 0.8em; }
        .contact-info a { color: #00ffa3; text-decoration: none; border-bottom: 1px solid transparent; }
        .contact-info a:hover { border-bottom: 1px solid #00ffa3; }
        .status { margin-top: 30px; font-size: 0.7em; color: #3fb950; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WEB3 STROLL</h1>
        <p style="opacity: 0.6; font-size: 0.9em;">自动化架构 & DePIN 资源中心</p>
        
        <div class="grid">
            <a href="https://github.com/zhouyuhua111149-wq/go" class="card">🚀 GO 库<br><small>核心脚本</small></a>
            <a href="https://github.com/zhouyuhua111149-wq/web3stroll.github.io" class="card">🔗 项目库<br><small>资源部署</small></a>
        </div>

        <div class="about-section">
            <h2>关于我们</h2>
            <p>Web3Stroll 专注于去中心化物理基础设施网络 (DePIN) 的探索与自动化实现。我们通过技术手段优化节点运行效率，实现数字资产的智能化管理。</p>
        </div>

        <div class="contact-info">
            <span>📧 zhouyuhua111149@gmail.com</span>
            <a href="https://x.com/zhouyuhua5023" target="_blank">𝕏 Twitter</a>
            <a href="https://github.com/zhouyuhua111149-wq" target="_blank">💻 GitHub</a>
        </div>

        <div class="status">● 系统状态：运行正常 | 已加密连接</div>
    </div>
</body>
</html>
