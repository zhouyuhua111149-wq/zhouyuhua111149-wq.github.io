
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WEB3STROLL | Global Cloud Distribution Service</title>
    <style>
        body { margin: 0; padding: 10px; background-color: #060606; color: #00ff00; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .app-header { text-align: center; padding: 15px 0; border-bottom: 1px solid #111; margin-bottom: 15px; }
        .app-header h1 { font-size: 1.1rem; color: #eee; margin: 0; letter-spacing: 2px; font-weight: 600; }
        .app-header p { color: #333; font-size: 0.7rem; margin: 5px 0 0 0; letter-spacing: 1px; text-transform: uppercase; }
        
        .grid-matrix { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        @media (max-width: 1024px) { .grid-matrix { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 800px) { .grid-matrix { grid-template-columns: repeat(3, 1fr); } }

        .unit-card {
            border: 1px solid #151515; background: #0c0c0c;
            aspect-ratio: 3/4; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            overflow: hidden;
        }
        .unit-label { position: absolute; top: 4px; left: 4px; font-size: 8px; color: #444; z-index: 10; }
        .uid-tag { font-size: 9px; color: #333; margin-bottom: 6px; z-index: 10; }
        
        .display-area {
            width: 85%; height: 60%; border: 1px solid #111;
            background: #000; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .status-msg { margin-top: 8px; font-size: 10px; font-weight: bold; color: #007700; z-index: 10; }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8) contrast(1.2);
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>WEB3STROLL · INFRASTRUCTURE</h1>
        <p>Global Edge Instance Manager v4.2.5</p>
    </div>
    <div class="grid-matrix" id="container"></div>

    <script>
        // Security Layer: Anti-Debugging
        (function() {
            function detect() { setInterval(() => { (function() { return false; constructor('debugger')(); })(); }, 50); }
            try { detect(); } catch (e) {}
        })();
        document.oncontextmenu = () => false;
        document.onkeydown = (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74))) return false;
        };

        // 4EVERLAND Gateway
        const GATEWAY = "https://4everland.io/ipfs/";

        // CIDs (1-12)
        const videoMap = {
            "01": "bafybeiddtqqxth7llo5s67mzvbyyemjk3tk4lwcwhqe2kics2flawfi2mq",
            "02": "bafybeiealxfxgfc3qrutdbrqcdgrrsewue5bcopq6h6nzefah4j6c6xdue",
            "03": "bafybeiblouatfk2narnq6l3h5uyjlw2pme2w6xirkuifgvxw4sn3vqk7gm",
            "04": "bafybeigeoqstaif2ymlwwchnd76g6mykusotuaatqwuggldwt7un5fcm7y",
            "05": "bafybeicrdtkxzxbbihfx6gemfdcldtt2j6aiekplyhcu2kb7ip5mqt3kii",
            "06": "bafybeieq5uq3tf7oyhfp76gfkvzofb4oje6g5oxegas7xkzgosgbzdhiwa",
            "07": "bafybeigwylb4n4wnsc6g6ganmue3ntk6wsb4tbabfflde4cfuaiicmn4v4",
            "08": "bafybeibok4jlp5alnr7p47r2wfmg5l4tagsfecpyzxyh65broppnpbrsom",
            "09": "bafybeichlefmzqqns4zdgmk7mtmm4tpempdz47xr54mshnvf64gneey23q",
            "10": "bafybeiej4yhzuq52sdpuluujlpyzprj5t4fbg4ri2xz5nahlgedl7m3fgy",
            "11": "bafybeifmjfqha43rewjhhhiflzhzay2k6sszd4wr7s5uwqf4uz56gc5zky",
            "12": "bafybeibkpsozjqqzodx7iegq7z5fiavrfviejuccibedpalqddv2k3sica"
        };

        // Render 24 Instances
        const wrapper = document.getElementById('container');
        for (let i = 1; i <= 24; i++) {
            const div = document.createElement('div');
            div.className = 'unit-card';
            
            let vidKey = (i % 12 === 0) ? "12" : (i % 12).toString().padStart(2, '0');
            let currentCid = videoMap[vidKey];

            div.innerHTML = `
                <span class="unit-label">TRACE_LOG_${i}</span>
                <div class="uid-tag">INSTANCE: ${1024 + i}</div>
                <div class="display-area">
                    <video src="${GATEWAY}${currentCid}" autoplay loop muted playsinline></video>
                </div>
                <div class="status-msg">ACTIVE (${Math.floor(Math.random() * 15) + 10}ms)</div>
            `;
            wrapper.appendChild(div);
        }
    </script>
</body>
</html>
